version: '3.9'
services:
  paysentinel:
    build: { context: ., target: production }
    container_name: paysentinel-app
    restart: unless-stopped
    env_file: .env.production
    volumes: [./models:/app/models, ./logs:/app/logs, ./data:/app/data]
    networks: [ps-net]
    healthcheck:
      test: [CMD, curl, -f, http://localhost:5000/api/health]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits: { cpus: '1.5', memory: 1G }
        reservations: { cpus: '0.5', memory: 512M }

  nginx:
    image: nginx:1.25-alpine
    container_name: paysentinel-nginx
    restart: unless-stopped
    ports: [80:80]
    volumes: [./nginx/nginx.conf:/etc/nginx/nginx.conf:ro]
    depends_on: { paysentinel: { condition: service_healthy } }
    networks: [ps-net]

networks:
  ps-net: { driver: bridge }
