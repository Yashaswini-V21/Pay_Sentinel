<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer Shield -->
    <path d="M50 5L15 20V45C15 67.2 30 87.8 50 95C70 87.8 85 67.2 85 45V20L50 5Z" fill="#e24b4a" fill-opacity="0.1"/>
    <path d="M50 5L15 20V45C15 67.2 30 87.8 50 95C70 87.8 85 67.2 85 45V20L50 5Z" stroke="#e24b4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Central Sentinel Eye / Core -->
    <circle cx="50" cy="45" r="18" fill="#07070f"/>
    <circle cx="50" cy="45" r="15" stroke="white" stroke-width="4"/>
    
    <!-- Pulse Lines -->
    <path d="M50 35V55" stroke="#e24b4a" stroke-width="3" stroke-linecap="round">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M40 45H60" stroke="#e24b4a" stroke-width="3" stroke-linecap="round">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </path>
    
    <!-- Digital Accent -->
    <path d="M25 35C25 35 35 25 50 25C65 25 75 35 75 35" stroke="#7060ee" stroke-width="3" stroke-linecap="round" opacity="0.8">
        <animate attributeName="stroke-dasharray" from="0,150" to="150,0" dur="3s" repeatCount="indefinite" />
    </path>
</svg>
