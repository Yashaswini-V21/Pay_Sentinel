name: PaySentinel CI/CD Pipeline

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Install linters
        run: pip install flake8 black isort
      - name: Run flake8 (errors only, ignore style)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          flake8 src/app.py src/model.py src/generate_data.py src/voice_alerts.py src/pdf_report.py --max-line-length=120 --select=E9,F63,F7,F82 --statistics
      - name: Check black formatting
        run: black --check --diff src/app.py src/model.py src/generate_data.py
        continue-on-error: true  # Don't fail on formatting, just warn

  test:
    name: API Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bleach
      - name: Run API tests with coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term --cov-fail-under=40
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  ml_validation:
    name: ML Pipeline Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Install ML dependencies
        run: |
          pip install -r requirements.txt
      - name: Generate synthetic data
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python src/generate_data.py
      - name: Train and validate detector
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python tests/integration/ml_validate.py

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Install security tools
        run: pip install bandit safety
      - name: Run Bandit security scan
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          bandit -r src/app.py src/model.py src/generate_data.py -ll -ii
      - name: Report security status
        if: always()
        run: |
          echo "## Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "Bandit scan finished. Review results above." >> $GITHUB_STEP_SUMMARY
      - name: Check dependencies for known vulnerabilities
        run: safety check --file requirements.txt

  docker_build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test, ml_validation]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfile exists
        run: |
          if [ -f Dockerfile ]; then
            docker build --no-cache --target production -t paysentinel:test .
            echo "Docker build SUCCESS"
          else
            echo "No Dockerfile found — skipping build"
          fi

  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, ml_validation, security_scan]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## PaySentinel CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ML Validation | ${{ needs.ml_validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security_scan.result }} |" >> $GITHUB_STEP_SUMMARY
