worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    # Rate Limiting Zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    server {
        listen 80;
        server_name localhost;
        server_tokens off;

        client_max_body_size 10M;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Static Files
        location /static/ {
            proxy_pass http://paysentinel:5000/static/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # Health Check (No Logging)
        location /api/health {
            proxy_pass http://paysentinel:5000/api/health;
            access_log off;
        }

        # Streaming API
        location /api/stream {
            proxy_pass http://paysentinel:5000/api/stream;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        # General API with Rate Limiting
        location /api/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass http://paysentinel:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Dashboard and Index
        location / {
            proxy_pass http://paysentinel:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
